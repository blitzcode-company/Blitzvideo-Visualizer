<app-header></app-header>

<div class="configuracion" [class.collapsed]="sidebarCollapsed$ | async">
  <div class="sidebar">
    <a class="selected" href="/ajustes/perfil"> <mat-icon>account_box</mat-icon>

      <span>Perfil</span></a>
    <a href="/ajustes/pagos"><mat-icon>payment</mat-icon>
      <span>Pagos</span></a>
    <a href="/ajustes/streams"> <mat-icon>view_stream</mat-icon>
      <span>Streams</span></a>
  </div>

  <div class="containerConfig container-fluid">
    
    <div class="header" style="cursor: pointer;" (click)="togglePerfil()">
        <h2>
          <i class="fas" [ngClass]="mostrarPerfil ? 'fa-chevron-down' : 'fa-chevron-right'"></i>
          Editar Perfil de Usuario
        </h2>
        <hr />
      </div>
      
    <div class="form-container" *ngIf="mostrarPerfil" @fadeInOut>
      <form #formUsuario="ngForm" (ngSubmit)="onSubmitUsuario(formUsuario)">
        <div class="form-group">
          <label for="userName">Nombre de perfil</label>
          <input type="text" id="userName" class="form-control" [(ngModel)]="usuario.name" name="name" required />
        </div>

        <div class="form-group">
          <label for="fechaNac">Fecha de nacimiento</label>
          <input type="date" id="fecha_de_nacimiento" class="form-control" [(ngModel)]="usuario.fecha_de_nacimiento" name="fecha_de_nacimiento" required />
        </div>

        <div class="photo-upload">
          <img class="user-photo" *ngIf="fotoPreview" [src]="fotoPreview" alt="Vista previa de foto" />
          <img class="user-photo" *ngIf="!fotoPreview && usuario.foto" [src]="usuario.foto" alt="Foto de perfil" />
          <br>

          <label for="userPhoto" class="upload-button">
            
            <i class="fas fa-upload"></i> Subir nueva foto
          </label>
          <input type="file" id="userPhoto" class="file-input" (change)="onFileSelected($event)" />
        </div>
        <br>

        <button type="submit" class="btn-submit">Guardar cambios</button>
      </form>

    </div>

    <div class="header" *ngIf="tieneCanal" style="cursor: pointer;" (click)="toggleCanal()">
        <h2>
          <i class="fas" [ngClass]="mostrarCanal ? 'fa-chevron-down' : 'fa-chevron-right'"></i>
          Editar Canal
        </h2>
        <hr />
      </div>

    <div class="form-container" *ngIf="tieneCanal && mostrarCanal; else noCanalTemplate" @fadeInOut>
      <form #formCanal="ngForm" (ngSubmit)="onSubmitCanal(formCanal)">
        <div class="form-group">
          <label for="canalNombre">Nombre del canal</label>
          <input type="text" id="canalNombre" class="form-control" [(ngModel)]="canal.nombre" name="nombre" placeholder="Nombre del canal" required />
        </div>

        <div class="form-group">
          <label for="canalDescripcion">Descripción del canal</label>
          <textarea id="canalDescripcion" class="form-control" [(ngModel)]="canal.descripcion" name="descripcion" placeholder="Descripción del canal" required></textarea>
        </div>

        <div class="form-group photo-upload">
          <img class="channel-cover" *ngIf="canal.portadaPreview" [src]="canal.portadaPreview" alt="Portada del canal" />
          <label for="portadaImage" class="upload-button">
            <i class="fas fa-upload"></i> Subir portada
          </label>
          <input type="file" id="portadaImage" class="file-input" (change)="onFileSelectedPortada($event)" />
        </div>
        <br />
        <button type="submit" class="btn-submit">Guardar Cambios</button>
      </form>
      <div class="alert-container" *ngIf="alertMessageCanal">
        <div class="alert alert-info">{{ alertMessageCanal }}</div>
      </div>
    </div>

    <ng-template #noCanalTemplate>
      <div class="alert alert-warning" *ngIf="!tieneCanal">
        No tienes un canal creado. <a [href]="serverIp + '3001' + '/#/crearCanal'">Haz click aquí para crear uno</a>.
      </div>
    </ng-template>

    <div class="header" style="cursor: pointer;" (click)="togglePassword()">
      <h2>
        <i class="fas" [ngClass]="mostrarPassword ? 'fa-chevron-down' : 'fa-chevron-right'"></i>
        Cambiar Contraseña
      </h2>
      <hr />
    </div>

    <div class="form-container" *ngIf="mostrarPassword" @fadeInOut>
      <form #formPassword="ngForm" (ngSubmit)="onSubmitPassword(formPassword)">
        <div class="form-group">
          <label for="currentPassword">Contraseña actual</label>
          <input 
            type="password" 
            id="currentPassword" 
            class="form-control" 
            [(ngModel)]="passwordData.current_password" 
            name="current_password" 
            placeholder="Ingresa tu contraseña actual"
            required 
          />
        </div>

        <div class="form-group">
          <label for="newPassword">Nueva contraseña</label>
          <input 
            type="password" 
            id="newPassword" 
            class="form-control" 
            [(ngModel)]="passwordData.new_password" 
            name="new_password" 
            placeholder="Ingresa tu nueva contraseña"
            minlength="8"
            required 
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar nueva contraseña</label>
          <input 
            type="password" 
            id="confirmPassword" 
            class="form-control" 
            [(ngModel)]="passwordData.new_password_confirmation" 
            name="new_password_confirmation" 
            placeholder="Confirma tu nueva contraseña"
            minlength="8"
            required 
          />
        </div>

        <button type="submit" class="btn-submit" [disabled]="!formPassword.valid">Cambiar contraseña</button>
      </form>
    </div>

  </div>
</div>
