<div class="modal-header">
  <h2 mat-dialog-title>
    <mat-icon class="warning-icon">warning</mat-icon>
    Confirmar Baja de Premium
  </h2>
</div>

<mat-dialog-content class="modal-content">
  <p>¿Estás seguro de que deseas dar de baja tu plan Premium?</p>
  <p class="warning-text">Esta acción cancelará tu suscripción y perderás acceso a los beneficios Premium.</p>
</mat-dialog-content>

<mat-dialog-actions class="modal-actions">
  <button mat-button (click)="cancelar()" class="btn-cancelar">
    Cancelar
  </button>
  <button mat-raised-button color="warn" (click)="confirmar()" class="btn-confirmar">
    Sí, dar de baja
  </button>
</mat-dialog-actions>
