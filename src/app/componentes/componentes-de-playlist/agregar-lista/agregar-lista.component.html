<div class="body-modal">

  <h2 mat-dialog-title class="titulo-modal">
    <mat-icon>add_to_queue</mat-icon>
    Agregar a lista de reproducción
  </h2>

  <mat-dialog-content class="content-modal">

    <div *ngIf="loading" class="loading-container">
      <mat-spinner diameter="30"></mat-spinner>
    </div>

    <div *ngIf="!loading && listas.length === 0" class="no-lists-container">
      <p class="no-lists-text">
        <mat-icon>playlist_add</mat-icon><br>
        No tienes listas de reproducción creadas.
      </p>
    </div>

    <mat-form-field 
    appearance="outline" 
    class="full-width form-field"
    *ngIf="!loading && listas.length > 0">
      <mat-label>Selecciona una lista</mat-label>
     <mat-select [(ngModel)]="listaSeleccionada" 
              placeholder="Elige una lista" 
              class="custom-select">
      <mat-option *ngFor="let lista of listas" [value]="lista.id" class="custom-option">
        {{ lista.nombre }} ({{ lista.videos?.length || 0 }} videos)
      </mat-option>
    </mat-select>
  </mat-form-field>

    <button 
      mat-stroked-button 
      color="primary" 
      (click)="abrirCrearListaModal()"
      class="full-width btn-crear-lista"
      [disabled]="loading">
      <mat-icon>add</mat-icon>
      Crear nueva lista
    </button>

  </mat-dialog-content>

  <mat-dialog-actions align="end" class="actions-modal">
    <button mat-button (click)="onNoClick()" class="btn-cancelar" [disabled]="loading">
      Cancelar
    </button>
    <button 
      mat-raised-button 
      color="primary" 
      (click)="agregarVideo()"
      class="btn-agregar"
      [disabled]="loading || !listaSeleccionada">
      <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
      <span *ngIf="!loading">Agregar</span>
    </button>
  </mat-dialog-actions>

</div>
